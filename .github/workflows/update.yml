name: Update Blocklist

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

env:
  SOURCES: config/sources.txt
  RAW_DIR: lists/_raw
  OUTPUT: lists/merged.txt

permissions: {}

concurrency:
  group: blocklist-update-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_validate:
    if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/release-py314.txt

      - name: Install Dependencies
        run: python -m pip install -q -c constraints/release-py314.txt ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Get Cache Key
        id: cache-key
        run: echo "date=$(date -u +'%Y-%m-%d_%H%M')" >> $GITHUB_OUTPUT

      - name: Restore Cache
        id: cache-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .cache
            ~/.cache/tldextract
          key: blocklists-${{ steps.cache-key.outputs.date }}
          restore-keys: blocklists-

      - name: Prepare Report Directories
        run: mkdir -p reports previous

      - name: Fetch Sources
        id: fetch
        run: |
          START=$(date +%s)
          python -m scripts.downloader \
            --sources "$SOURCES" \
            --outdir "$RAW_DIR" \
            --cache .cache \
            --concurrency 10 \
            --timeout 25 \
            --health-report reports/source-health.json
          echo "time=$(($(date +%s) - START))s" >> $GITHUB_OUTPUT
          echo "count=$(find "$RAW_DIR" -name '*.txt' | wc -l)" >> $GITHUB_OUTPUT

      - name: Compile Sources
        id: compile
        run: |
          START=$(date +%s)
          python -m scripts.pipeline "$RAW_DIR" "$OUTPUT" \
            --json-stats reports/pipeline-stats.json \
            --source-health-report reports/source-health.json
          echo "time=$(($(date +%s) - START))s" >> $GITHUB_OUTPUT

      - name: Append Runtime Profile Summary
        run: |
          SUMMARY_PATH="$GITHUB_STEP_SUMMARY" python - <<'PY'
          import json
          import os
          from pathlib import Path

          stats_path = Path("reports/pipeline-stats.json")
          if not stats_path.exists():
              raise SystemExit("Missing reports/pipeline-stats.json")

          data = json.loads(stats_path.read_text(encoding="utf-8"))
          profile = data.get("runtime_profile", {})
          stage = profile.get("stage_durations_seconds", {})
          sizes = profile.get("byte_sizes", {})
          memory = profile.get("memory", {})
          child = profile.get("child_resources", {})
          source_health = profile.get("source_health", {})
          lines = [
              "## Runtime Profile",
              "",
              "| Metric | Value |",
              "| ------ | ----- |",
              f"| Worker count | {profile.get('worker_count', 'unknown')} |",
              f"| Clean seconds | {stage.get('clean_seconds', 'unknown')} |",
              f"| Compile seconds | {stage.get('compile_seconds', 'unknown')} |",
              f"| Raw input bytes | {sizes.get('raw_input_bytes', 'unknown')} |",
              f"| Output bytes | {sizes.get('output_bytes', 'unknown')} |",
              f"| Tracemalloc current bytes | {memory.get('tracemalloc_current_bytes', 'unknown')} |",
              f"| Tracemalloc peak bytes | {memory.get('tracemalloc_peak_bytes', 'unknown')} |",
              f"| Current process ru_maxrss | {memory.get('resource_ru_maxrss', 'unknown')} |",
              f"| Child resources available | {child.get('available', 'unknown')} |",
              f"| Child user CPU seconds | {child.get('user_cpu_seconds', 'unknown')} |",
              f"| Child system CPU seconds | {child.get('system_cpu_seconds', 'unknown')} |",
              f"| Child ru_maxrss | {child.get('resource_ru_maxrss', 'unknown')} |",
              f"| Source count | {source_health.get('source_count', 'unknown')} |",
              f"| Cache-backed sources | {source_health.get('cache_backed_sources', 'unknown')} |",
              f"| Failed sources | {source_health.get('failed_sources', 'unknown')} |",
              f"| Source-health report | {source_health.get('report_path', 'reports/source-health.json')} |",
              "",
          ]

          with open(os.environ["SUMMARY_PATH"], "a", encoding="utf-8") as summary:
              summary.write("\n".join(lines))
              summary.write("\n")
          PY

      - name: Calculate Stats
        id: stats
        run: |
          RULES=$(wc -l < "$OUTPUT")
          SIZE=$(du -h "$OUTPUT" | cut -f1)
          echo "rules=$RULES" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Download Previous Release Output
        run: |
          curl -fL \
            "https://github.com/${{ github.repository }}/releases/latest/download/merged.txt" \
            -o previous/merged.txt || true

      - name: Validate Release Candidate
        run: |
          python -m scripts.release_validator \
            --source-health reports/source-health.json \
            --pipeline-stats reports/pipeline-stats.json \
            --output "$OUTPUT" \
            --canaries config/release_canaries.json \
            --previous-output previous/merged.txt \
            --summary-json reports/validation-summary.json \
            --summary-md reports/validation-summary.md \
            --evidence-json reports/release-evidence.json

      - name: Append Validation Summary
        if: always()
        run: |
          if [ -f reports/validation-summary.md ]; then
            cat reports/validation-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Release Validation"
              echo ""
              echo "Validation summary was not generated. Check workflow logs and diagnostics."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Release Diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-candidate
          path: |
            lists/merged.txt
            reports/*.json
            reports/*.md
          if-no-files-found: warn
          retention-days: 14

      - name: Save Cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        if: always() && steps.fetch.outcome == 'success'
        with:
          path: |
            .cache
            ~/.cache/tldextract
          key: blocklists-${{ steps.cache-key.outputs.date }}

  python_compatibility_audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/release-py314.txt

      - name: Install Audit Dependencies
        run: python -m pip install -e ".[dev]" --ignore-requires-python -c constraints/release-py314.txt

      - name: Ruff
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

  publish:
    needs: build_validate
    if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && success() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download Release Candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-candidate
          path: release-candidate

      - name: Stage Release File
        id: release-stats
        run: |
          mkdir -p "$(dirname "$OUTPUT")"
          cp release-candidate/lists/merged.txt "$OUTPUT"
          RULES=$(wc -l < "$OUTPUT")
          SIZE=$(du -h "$OUTPUT" | cut -f1)
          echo "rules=$RULES" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: latest
          name: Merged Blocklist
          body: |
            ## Merged Blocklist

            | Stat | Value |
            |------|-------|
            | Rules | ${{ steps.release-stats.outputs.rules }} |
            | Size | ${{ steps.release-stats.outputs.size }} |

            ### Usage
            Add to AdGuard Home -> Filters -> DNS Blocklists:
            ```
            https://github.com/${{ github.repository }}/releases/download/latest/merged.txt
            ```
          files: |
            ${{ env.OUTPUT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cache_cleanup:
    needs: build_validate
    if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && success() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write

    steps:
      - name: Cleanup Old Caches
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --repo ${{ github.repository }} \
            --key blocklists- \
            --sort created_at \
            --order desc \
            --limit 100 \
            --json key \
            --jq '.[3:] | .[].key' | while read -r key; do
              echo "Deleting cache: $key"
              gh cache delete "$key" --repo ${{ github.repository }} || true
          done
