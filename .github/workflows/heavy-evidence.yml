name: Heavy Release Evidence

on:
  workflow_dispatch:

env:
  SOURCES: config/sources.txt
  RAW_DIR: lists/_raw

permissions: {}

concurrency:
  group: heavy-release-evidence
  cancel-in-progress: false

jobs:
  heavy_evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: python -m pip install -q -c constraints/release-py314.txt ".[dev]"

      - name: Prepare Evidence Directories
        run: mkdir -p reports/heavy-evidence reports/benchmarks reports/profiles "$RAW_DIR" .cache

      - name: Fetch Sources
        run: |
          python -m scripts.downloader \
            --sources "$SOURCES" \
            --outdir "$RAW_DIR" \
            --cache .cache \
            --concurrency 10 \
            --timeout 25 \
            --health-report reports/heavy-evidence/source-health.json

      - name: Freeze Benchmark Dataset
        id: freeze
        run: |
          DATASET_ID="gha-${{ github.run_id }}"
          MANIFEST_OUTPUT=$(python -m scripts.benchmark_pipeline freeze \
            --input-dir "$RAW_DIR" \
            --source-health-report reports/heavy-evidence/source-health.json \
            --dataset-id "$DATASET_ID")
          printf '%s\n' "$MANIFEST_OUTPUT"
          MANIFEST_PATH="${MANIFEST_OUTPUT#Frozen manifest: }"
          echo "manifest=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Run Frozen Benchmark
        run: |
          DATASET_ID="gha-${{ github.run_id }}"
          BENCHMARK_REPORT="reports/benchmarks/runs/${DATASET_ID}/benchmark-frozen.json"
          python -m scripts.benchmark_pipeline run-frozen \
            --manifest "${{ steps.freeze.outputs.manifest }}" \
            --iterations 1 \
            --report "$BENCHMARK_REPORT"
          cp "$BENCHMARK_REPORT" reports/heavy-evidence/benchmark-frozen.json

      - name: Profile Pipeline
        run: |
          python -m scripts.profile_pipeline "$RAW_DIR" \
            --run-id "gha-${{ github.run_id }}" \
            --report-dir reports/profiles/heavy-evidence

      - name: Upload Heavy Evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: heavy-release-evidence
          path: |
            reports/heavy-evidence/**
            reports/benchmarks/**
            reports/profiles/**
          if-no-files-found: warn
          retention-days: 14
